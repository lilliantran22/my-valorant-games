<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Stat Guesser | My Valorant Games</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/stat_guesser.css">
</head>
<body>
    <div class="app-container sg-container">
        <a href="../../index.html" class="back-to-hub">← Back to Hub</a>

        <div class="game-hub-header">
            <h1>
                <img src="../../images/mvg_logo.png" alt="MVG" class="section-logo">
                Stat Guesser
            </h1>
            <div class="game-badges">
                <a href="how-to-play.html" class="badge" style="text-decoration:none;">How to Play</a>
                <a href="about.html" class="badge" style="text-decoration:none;">About</a>
            </div>
        </div>

        <!-- Settings Bar -->
        <div class="sg-settings-bar">
            <div class="sg-settings-left">
                <button class="sg-btn" id="filterBtn">📅 Filter Years</button>
                <button class="sg-btn" id="customizeBtn">⚙ Customize Visibility</button>
                <button class="sg-btn" id="revealMapBtn">🗺 Reveal Map</button>
                <button class="sg-btn sg-btn-danger" id="newGameBtn">🔄 New Game</button>
            </div>
            <div class="sg-score">
                Score: <span id="scoreDisplay">0</span> &nbsp;|&nbsp; Streak: <span id="streakDisplay">0</span> 🔥
            </div>
        </div>

        <!-- Filter Panel -->
        <div class="sg-settings-panel" id="filterPanel">
            <h3>Filter by Year</h3>
            <div class="sg-settings-row">
                <div class="sg-settings-group">
                    <div class="sg-year-pills" id="yearPills">
                        <button class="sg-year-pill active" data-year="all">All</button>
                        <button class="sg-year-pill active" data-year="2021">2021</button>
                        <button class="sg-year-pill active" data-year="2022">2022</button>
                        <button class="sg-year-pill active" data-year="2023">2023</button>
                        <button class="sg-year-pill active" data-year="2024">2024</button>
                        <button class="sg-year-pill active" data-year="2025">2025</button>
                    </div>
                </div>
                <div class="sg-panel-buttons">
                    <button class="sg-default-btn" id="filterDefaultBtn">Default</button>
                    <button class="sg-deselect-btn" id="filterDeselectBtn">Deselect All</button>
                    <button class="sg-apply-btn" id="applyFilterBtn">Apply & Save</button>
                </div>
            </div>
        </div>

        <!-- Customize Visibility Panel -->
        <div class="sg-settings-panel" id="customizePanel">
            <h3>Customize Visibility</h3>
            <div class="sg-settings-row">
                <div class="sg-settings-group">
                    <div class="sg-all-toggles" id="allToggles">
                        <button class="sg-stat-toggle active" data-stat="ACS">ACS</button>
                        <button class="sg-stat-toggle active" data-stat="KD">K/D</button>
                        <button class="sg-stat-toggle active" data-stat="ADR">ADR</button>
                        <button class="sg-stat-toggle active" data-stat="KAST">KAST</button>
                        <button class="sg-stat-toggle active" data-stat="HS">HS%</button>
                        <button class="sg-info-toggle active" data-info="Player">Player Name</button>
                        <button class="sg-info-toggle active" data-info="Team">Team</button>
                        <button class="sg-info-toggle active" data-info="Match Type">Match Type</button>
                        <button class="sg-info-toggle active" data-info="Year">Year</button>
                    </div>
                </div>
                <div class="sg-panel-buttons">
                    <button class="sg-default-btn" id="customizeDefaultBtn">Default</button>
                    <button class="sg-deselect-btn" id="customizeDeselectBtn">Deselect All</button>
                    <button class="sg-apply-btn" id="applyCustomizeBtn">Apply & Save</button>
                </div>
            </div>
        </div>

        <!-- Game Area -->
        <div id="gameArea">
            <div class="sg-loading" id="loadingMsg">Loading data...</div>
        </div>
    </div>

    <script src="../../js/agent-data.js"></script>
    <script src="../../js/map-data.js"></script>
    <script src="../../js/stat_guesser_game.js"></script>
</body>
</html>
